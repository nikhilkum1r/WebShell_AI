version: "3.9"

services:
  api:
    build: .
    container_name: webshell_api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - PREDICTION_THRESHOLD=0.5
      - CORS_ORIGINS=http://localhost:8080
    restart: unless-stopped
    volumes:
      - ./Output:/app/Output:ro # read-only model artefacts
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: serve the frontend via nginx
  frontend:
    image: nginx:alpine
    container_name: webshell_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped
